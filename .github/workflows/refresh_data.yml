name: Daily Data Refresh

# Pulls fresh financial data from Yahoo Finance every day at 06:00 UTC (08:00 CEST)
# and commits the updated CSVs back to the repo so Power BI can pull them.

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch: {}    # allow manual trigger from the Actions tab
  push:
    paths:
      - "scripts/fetch_data.py"   # refresh on pipeline changes

permissions:
  contents: write            # required to commit updated CSVs back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python scripts/fetch_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
